name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Judge API contract test
        run: npm run test:judge

      - name: Supabase schema check
        run: npm run test:supabase

      - name: Workflow contract check
        run: npm run test:workflows

      - name: Docs contract check
        run: npm run test:docs

      - name: Vercel env sync dry run
        run: npm run test:vercel-env-sync

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Smoke test
        run: npm run test:smoke
